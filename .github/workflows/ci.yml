name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run markdownlint
      uses: DavidAnson/markdownlint-cli2-action@v15
      with:
        globs: "**/*.md"

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: poetry install --no-root

    - name: Run Black
      run: poetry run black --check backend/app backend/tests

    - name: Run Ruff
      run: poetry run ruff check backend/app backend/tests

    - name: Run MyPy
      run: poetry run mypy backend/app

    - name: Run Tests
      run: poetry run pytest

    - name: Run Backend Coverage
      run: poetry run pytest --cov=backend/app --cov-fail-under=85

    - name: Backend Security Audit (pip-audit)
      run: |
        pip install pip-audit
        poetry run pip-audit

  frontend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Lint
      run: npm run lint
      
    - name: Typecheck
      run: npm run type-check || vue-tsc -b
      
    - name: Unit Tests & Coverage
      run: npx vitest run --coverage
      
    - name: Security Audit (npm audit)
      run: npm audit
      
    - name: Playwright E2E Tests
      run: |
        npx playwright install --with-deps
        npx playwright test

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker Image
      run: docker build -t analytics-backend:test -f docker/backend.Dockerfile .

  release:
    name: Production Release
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-lint-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
